name: Build RustDesk Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      # Removido o VCPKG_BINARY_SOURCES problemático
      VCPKG_ROOT: C:\vcpkg
      # RustDesk precisa dessas variáveis para embutir no EXE
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RELAY_SERVER: ${{ vars.RELAY_SERVER }}
      API_SERVER: ${{ vars.API_SERVER }}
      KEY: ${{ vars.KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Em vez de clonar do zero, usamos o vcpkg que já vem no GitHub Actions
      # ou o script de setup oficial para evitar incompatibilidade.
      - name: Setup vcpkg
        run: |
          cd C:\
          if (!(Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg
            cd vcpkg
            .\bootstrap-vcpkg.bat
          }

      - name: Install NASM & LLVM (Necessários para pacotes de vídeo)
        run: |
          choco install nasm llvm -y

      # O segredo do RustDesk: ele usa "Overlay Ports"
      # Apontamos o vcpkg para a pasta de ports do próprio RustDesk
      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install --overlay-ports=./res/vcpkg/aom --overlay-ports=./res/vcpkg/libvpx --overlay-ports=./res/vcpkg/libyuv --overlay-ports=./res/vcpkg/mfx-dispatch --clean-after-build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      # Antes do build, o RustDesk geralmente precisa do script de pre-build 
      # para configurar as variáveis no código-fonte
      - name: Build
        run: |
          cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom
          path: target/release/rustdesk.exe
