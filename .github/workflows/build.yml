name: Build RustDesk Custom Hardcoded

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      # Variáveis para o Hardcode (O RustDesk as lê durante o build)
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ vars.RS_PUB_KEY }}
      API_SERVER: ${{ vars.API_SERVER }}
      # Desativa o cache problemático que causou aviso no seu log
      VCPKG_BINARY_SOURCES: "clear"

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # CORREÇÃO CRÍTICA: Instala ferramentas de compilação que o pacote 'aom' exige
      - name: Install Build Tools (NASM/Perl)
        run: |
          choco install nasm strawberryperl llvm -y
          # Garante que o NASM esteja no PATH para o Ninja encontrar
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup vcpkg
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            cd C:\vcpkg
            .\bootstrap-vcpkg.bat
          }

      # Instala dependências usando os overlays do próprio RustDesk
      # Adicionado o --no-parallel para evitar que o Ninja quebre na config do 'aom'
      - name: Install vcpkg dependencies
        run: |
          C:\vcpkg\vcpkg install `
            --overlay-ports=./res/vcpkg/aom `
            --overlay-ports=./res/vcpkg/libvpx `
            --overlay-ports=./res/vcpkg/libyuv `
            --overlay-ports=./res/vcpkg/mfx-dispatch `
            --clean-after-build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      # Injeta os dados no código antes de compilar para garantir o Hardcode
      - name: Inject Hardcoded Config
        run: |
          echo "Configurando servidor: $env:RENDEZVOUS_SERVER"
          # O RustDesk compila essas env vars dentro do binário automaticamente

      - name: Build Release
        run: |
          # Vcpkg integration e build
          cargo build --release

      - name: Upload Cliente Customizado
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Client
          path: target/release/rustdesk.exe
