name: Build RustDesk Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VCPKG_ROOT: C:\vcpkg
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RELAY_SERVER: ${{ vars.RELAY_SERVER }}
      API_SERVER: ${{ vars.API_SERVER }}
      KEY: ${{ vars.KEY }}

    steps:
      - name: Checkout (com submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg (fixed version)
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          cd C:\vcpkg
          git checkout 2024.05.24
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\buildtrees
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}

      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install || C:\vcpkg\vcpkg install

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "%USERPROFILE%\.cargo\bin" >> $env:GITHUB_PATH

      - name: Build
        run: cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom
          path: target/release/rustdesk.exe
