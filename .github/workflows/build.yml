name: Build RustDesk Custom Hardcoded

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ vars.RS_PUB_KEY }}
      API_SERVER: ${{ vars.API_SERVER }}
      VCPKG_BINARY_SOURCES: "clear"

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Tools (NASM/Perl/LLVM)
        run: |
          choco install nasm strawberryperl llvm -y
          # Força a atualização do PATH na sessão atual do Runner
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Tools (Anti-Aposta Step)
        run: |
          nasm --version
          perl --version
          cmake --version
          # Se algum desses falhar, o build para aqui e a gente sabe o porquê

      - name: Setup vcpkg
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            cd C:\vcpkg
            .\bootstrap-vcpkg.bat
          }

      - name: Install vcpkg dependencies
        run: |
          # Rodando o install no modo manifest (lendo o vcpkg.json)
          # Os overlays garantem que o vcpkg use as correções do RustDesk
          C:\vcpkg\vcpkg install `
            --triplet x64-windows `
            --overlay-ports=./res/vcpkg/aom `
            --overlay-ports=./res/vcpkg/libvpx `
            --overlay-ports=./res/vcpkg/libyuv `
            --overlay-ports=./res/vcpkg/mfx-dispatch `
            --clean-after-build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Build Release (Hardcoding happens here)
        run: |
          # Aqui os dados do seu servidor entram no binário
          cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Hardcoded
          path: target/release/rustdesk.exe
