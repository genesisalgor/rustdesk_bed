name: Build RustDesk Custom Hardcoded

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      # Hardcode dos seus dados
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ vars.RS_PUB_KEY }}
      API_SERVER: ${{ vars.API_SERVER }}
      VCPKG_BINARY_SOURCES: "clear"

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Instalação manual de ferramentas globais (Resolve 90% dos erros do aom)
      - name: Install Build Tools (NASM/Perl)
        run: |
          choco install nasm strawberryperl llvm -y
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # 2. Setup vcpkg limpo
      - name: Setup vcpkg
        run: |
          if (!(Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            cd C:\vcpkg
            .\bootstrap-vcpkg.bat
          }

      # 3. Instalação das dependências (Dividida para evitar erro de concorrência do Ninja)
      - name: Install vcpkg dependencies (Sequential)
        run: |
          # Primeiro o pacote problemático sozinho e sem paralelismo
          C:\vcpkg\vcpkg install aom:x64-windows --overlay-ports=./res/vcpkg/aom --clean-after-build
          
          # Depois os demais pacotes
          C:\vcpkg\vcpkg install `
            --overlay-ports=./res/vcpkg/libvpx `
            --overlay-ports=./res/vcpkg/libyuv `
            --overlay-ports=./res/vcpkg/mfx-dispatch `
            opus:x64-windows libjpeg-turbo:x64-windows `
            --clean-after-build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      # 4. Compilação com os dados embutidos
      - name: Build Release
        run: |
          # O cargo usará as variáveis de ambiente definidas no topo do YAML
          cargo build --release

      - name: Upload Cliente Customizado
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Client
          path: target/release/rustdesk.exe
