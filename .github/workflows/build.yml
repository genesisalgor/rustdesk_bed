name: Build RustDesk Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VCPKG_ROOT: C:\vcpkg
      RENDEZVOUS_SERVER: ${{ vars.RENDEZVOUS_SERVER }}
      RELAY_SERVER: ${{ vars.RELAY_SERVER }}
      API_SERVER: ${{ vars.API_SERVER }}
      KEY: ${{ vars.KEY }}

    steps:
      - name: Checkout (com submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      # ✅ CORREÇÃO AQUI
      - name: Install dependencies (manifest mode)
        run: C:\vcpkg\vcpkg install

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "%USERPROFILE%\.cargo\bin" >> $env:GITHUB_PATH

      - name: Build
        run: cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom
          path: target/release/rustdesk.exe
